baseurl = "https://sbloggel.netlify.app/"
languageCode = "en-us"
title = "Sbloggel"
theme = "hugo-lithium"
googleAnalytics = ""
disqusShortname = "sbloggel"
ignoreFiles = ["\\.Rmd$", "\\.Rmarkdown$", "_files$", "_cache$"]

[permalinks]
    post = "/:year/:month/:day/:slug/"

[[menu.main]]
    name = "Blog"
    url = "/"
[[menu.main]]
    name = "RSS feed"
    url = "/index.xml"
[[menu.main]]
    name = "About"
    url = "/about/"

[params]
    description = "Sebastian's blog about statistics and maybe other topics"

    # options for highlight.js (version, additional languages, and theme)
    highlightjsVersion = "9.12.0"
    highlightjsCDN = "//cdnjs.cloudflare.com/ajax/libs"
    highlightjsLang = ["r", "yaml"]
    highlightjsTheme = "github"

    MathJaxCDN = "//cdnjs.cloudflare.com/ajax/libs"
    MathJaxVersion = "2.7.5"

    # path to the favicon, under "static"
    favicon = "favicon.ico"

    [params.logo]
    url = "logo.png"
    width = 50
    height = 50
    alt = "Logo"

